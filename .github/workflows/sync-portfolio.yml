name: Sync to Portfolio

# Builds the app and publishes it to the portfolio repo (Vercel-deployed at
# joavn.dev), serving it at joavn.dev/dart-scores. Mirrors the pattern
# Versed, CHORIDOR-web, and Music-Popularity-Index use.
# Requires a repo secret PORTFOLIO_TOKEN: a PAT with write access to JoachimVN/Portfolio.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # No server/backend for this app (localStorage-only) - just a
        # static build, served under /dart-scores/.
        run: npm run build -- --base=/dart-scores/

      - name: Clone portfolio repo
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: git clone "https://x-access-token:${PORTFOLIO_TOKEN}@github.com/JoachimVN/Portfolio.git" portfolio

      - name: Sync built app -> projects/dart-scores/
        run: |
          rm -rf portfolio/projects/dart-scores
          mkdir -p portfolio/projects
          cp -r dist portfolio/projects/dart-scores

      - name: Commit and push
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/dart-scores/
          git diff --staged --quiet || git commit -m "chore: sync Dart Scores from Dart-Scores@${{ github.sha }}"
          git push
